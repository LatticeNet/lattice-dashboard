name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: enable corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.33.0 --activate
      - name: install
        run: pnpm install --frozen-lockfile
      - name: type check
        run: pnpm type-check
      - name: build
        run: pnpm build
